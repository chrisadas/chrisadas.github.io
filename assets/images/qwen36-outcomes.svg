<rect x="426.6" y="104" width="131.9" height="36" fill="#D85A30"/>
<rect x="558.6" y="104" width="117.0" height="36" fill="#888780"/>
<rect x="675.5" y="104" width="24.5" height="36" fill="#B4B2A9"/>
