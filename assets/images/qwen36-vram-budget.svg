<rect x="20" y="107" width="11" height="11" rx="2" fill="#378ADD"/><text class="t" x="37" y="116" font-size="13">Weights (4-bit) · ~17.5 GB</text>
<rect x="250" y="107" width="11" height="11" rx="2" fill="#EF9F27"/><text class="t" x="267" y="116" font-size="13">KV cache @ 256K · ~2.5 GB</text>
<rect x="480" y="107" width="11" height="11" rx="2" fill="#C7C5BC"/><text class="t" x="497" y="116" font-size="13">Overhead + headroom</text>
