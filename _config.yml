# Site settings
title: chrisadas
description: >-
  Personal blog — notes on software, engineering, and whatever else.
baseurl: ""
url: "https://chrisadas.github.io"

# Theme (GitHub Pages supported)
theme: minima

# Author shown in footer / SEO
author:
  name: chrisadas

# Plugins (all on the GitHub Pages whitelist)
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Minima settings
minima:
  skin: auto          # auto/light/dark — follows reader's OS setting
  date_format: "%b %-d, %Y"

# Build settings
markdown: kramdown
future: true          # publish posts even if their date is ahead of the build clock

# Files Jekyll should ignore
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - .bundle
  - README.md
